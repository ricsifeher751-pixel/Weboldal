<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOENIX | Premium Streaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #E50914; --black: #141414; --grey: #181818; }
        body { background: #000; color: #fff; font-family: 'Roboto', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* JELZŐABLAK JAVÍTÁSA - HOGY LÁTSZÓDJON */
        #gate { 
            position: fixed; 
            inset: 0; 
            background: #141414 !important; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            z-index: 20000; 
        }
        .card { 
            text-align: center; 
            width: 85%; 
            max-width: 350px; 
            padding: 25px;
            background: #000;
            border: 2px solid var(--red);
            border-radius: 10px;
        }
        h1.logo-big { color: var(--red); font-family: 'Bebas Neue'; font-size: 4em; margin: 0 0 10px 0; }
        
        /* FEHÉR MEZŐ, FEKETE BETŰVEL */
        input[type="password"] { 
            width: 100% !important; 
            padding: 15px !important; 
            margin: 20px 0 !important; 
            background: #ffffff !important; 
            color: #000000 !important; 
            border: none; 
            border-radius: 4px; 
            font-size: 18px !important; 
            display: block !important;
            box-sizing: border-box;
            font-weight: bold;
        }
        .login-btn { 
            width: 100%; padding: 15px; background: var(--red); color: white; 
            font-weight: bold; border: none; border-radius: 4px; cursor: pointer; font-size: 1.2em; 
        }

        /* NETFLIX STÍLUS */
        header { 
            padding: 0 4%; display: flex; justify-content: space-between; align-items: center; 
            position: fixed; top: 0; width: 100%; height: 70px; z-index: 1000; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            box-sizing: border-box;
        }
        .logo { color: var(--red); font-family: 'Bebas Neue'; font-size: 2.8em; text-decoration: none; }
        .search-container { display: flex; align-items: center; background: rgba(0,0,0,0.6); border: 1px solid #fff; padding: 5px 12px; border-radius: 4px; }
        #kIn { background: transparent; border: none; color: white; outline: none; width: 100px; }

        /* Billboard */
        .billboard { 
            height: 65vh; position: relative; background-size: cover; background-position: center top;
            display: flex; align-items: center; padding: 0 4%;
        }
        .billboard::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, #000, transparent); }
        .b-content { position: relative; z-index: 10; max-width: 600px; }
        .b-title { font-family: 'Bebas Neue'; font-size: 3.5em; margin: 0; line-height: 0.9; }

        /* Sorok és Kártyák */
        .row { padding: 20px 0 10px 4%; }
        .row h3 { font-family: 'Bebas Neue'; font-size: 1.5em; margin-bottom: 10px; }
        .f-l { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .f-l::-webkit-scrollbar { display: none; }

        .ka { min-width: 140px; position: relative; border-radius: 4px; overflow: hidden; background: #111; transition: 0.3s; }
        .ka:hover { transform: scale(1.05); z-index: 100; }
        .ka img { width: 100%; height: 200px; object-fit: cover; }
        
        .s-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 5px; opacity: 0; transition: 0.3s;
        }
        .ka:hover .s-overlay { opacity: 1; }
        .s-btn { width: 85%; background: #fff; border: none; padding: 6px; font-size: 10px; font-weight: bold; cursor: pointer; border-radius: 2px; }
        .s-btn.hu { background: var(--red); color: #fff; }
    </style>
</head>
<body>

<div id="gate">
    <div class="card">
        <h1 class="logo-big">PHOENIX</h1>
        <p style="color:white; margin-bottom:5px;">Írd be a jelszót:</p>
        <input type="password" id="pass" placeholder="****">
        <button class="login-btn" onclick="login()">BELÉPÉS</button>
    </div>
</div>

<div id="content" style="display:none;">
    <header id="mainNav">
        <div class="logo">PHOENIX</div>
        <div class="search-container">
            <input type="text" id="kIn" placeholder="Keresés..." onkeyup="if(event.key==='Enter')search()">
            <span onclick="search()" style="cursor:pointer">🔍</span>
        </div>
    </header>

    <div class="billboard" id="hero">
        <div class="b-content">
            <h1 class="b-title" id="hTitle">FILMEK & MESÉK</h1>
        </div>
    </div>

    <div id="search-results"></div>
    <div id="lists"></div>
</div>

<script>
    const K = "e51122b12f3367589e72ca612adb695c";
    const P = "Dá2369p@";

    function login() {
        if(document.getElementById('pass').value === P) {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            startApp();
        } else { alert("Helytelen jelszó!"); }
    }

    async function startApp() {
        const res = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${K}&language=hu-HU`);
        const data = await res.json();
        const top = data.results[0];
        document.getElementById('hero').style.backgroundImage = `url('https://image.tmdb.org/t/p/w1280${top.backdrop_path}')`;
        document.getElementById('hTitle').innerText = top.title;

        const cats = [
            {n: '🧸 Mesék & Családi filmek', u: 'discover/movie', p: '&with_genres=16,10751'},
            {n: '🎬 Friss Mozis Premierek', u: 'movie/now_playing', p: '&region=HU'},
            {n: '⚔️ Akció & Kaland', u: 'discover/movie', p: '&with_genres=28'},
            {n: '🚀 Sci-Fi & Fantasy', u: 'discover/movie', p: '&with_genres=878'}
        ];

        const listDiv = document.getElementById('lists');
        for(let c of cats) {
            const r = await fetch(`https://api.themoviedb.org/3/${c.u}?api_key=${K}&language=hu-HU${c.p || ''}`);
            const d = await r.json();
            renderRow(listDiv, c.n, d.results);
        }
    }

    function renderRow(container, title, movies) {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `<h3>${title}</h3><div class="f-l">${movies.map(m => `
            <div class="ka">
                <img src="https://image.tmdb.org/t/p/w342${m.poster_path}">
                <div class="s-overlay">
                    <button class="s-btn hu" onclick="openV('${m.id}', 3)">SZ3 (MAGYAR)</button>
                    <button class="s-btn" onclick="openV('${m.id}', 1)">SZ1</button>
                    <button class="s-btn" onclick="openV('${m.id}', 4)">SZ4</button>
                </div>
            </div>`).join('')}</div>`;
        container.appendChild(row);
    }

    function openV(id, s) {
        const links = [
            `https://vidsrc.xyz/embed/movie/${id}`,
            `https://vidsrc.me/embed/movie?tmdb=${id}`,
            `https://embed.su/embed/movie/${id}`,
            `https://vidsrc.pro/embed/movie/${id}`
        ];
        window.open(links[s-1], '_blank');
    }

    async function search() {
        const q = document.getElementById('kIn').value;
        if(!q) return;
        const r = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${K}&query=${encodeURIComponent(q)}&language=hu-HU`);
        const d = await r.json();
        const resDiv = document.getElementById('search-results');
        resDiv.innerHTML = "";
        renderRow(resDiv, `Találatok: ${q}`, d.results);
    }
</script>
</body>
</html>
